services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-techbold}
      POSTGRES_USER: ${POSTGRES_USER:-techbold}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-techbold_dev_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - techbold

  backend-api:
    build:
      context: ./backend
    image: techbold-backend:dev
    env_file:
      - path: .env
        required: false   # copy .env.example -> .env; the stack still starts without it
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://techbold:techbold_dev_password@postgres:5432/techbold}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    volumes:
      # Your SSH private key(s). Put your .pem in ./keys (git-ignored).
      - ./keys:/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    extra_hosts:
      # Lets the container reach a Phoenix mock running on the host, if you run one.
      - "host.docker.internal:host-gateway"
    networks:
      - techbold

  worker:
    image: techbold-backend:dev
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://techbold:techbold_dev_password@postgres:5432/techbold}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["python", "-m", "app.worker"]
    volumes:
      - ./keys:/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      backend-api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - techbold

  frontend:
    build:
      context: ./frontend
      target: development
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      backend-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5173').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - techbold

volumes:
  postgres-data:

networks:
  techbold:
    driver: bridge
